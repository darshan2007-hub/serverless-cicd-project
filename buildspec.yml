version: 0.2

env:
  variables:
    NODE_ENV: production
  parameter-store:
    VITE_API_URL: /cloudnova/VITE_API_URL

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo Install phase started on `date`
      - cd frontend
      - npm ci

  pre_build:
    commands:
      - echo Pre-build phase started on `date`
      - echo Building the React application...

  build:
    commands:
      - echo Build phase started on `date`
      - npm run build
      - cd ..

  post_build:
    commands:
      - echo Post-build phase started on `date`
      - echo Deploying to S3...
      - aws s3 sync frontend/dist/ s3://cloudnova-serverless-website-2026/ --delete --cache-control "public,max-age=31536000,immutable" --exclude "index.html"
      - aws s3 cp frontend/dist/index.html s3://cloudnova-serverless-website-2026/index.html --cache-control "public,max-age=0,must-revalidate"
      - echo Build completed on `date`

artifacts:
  files:
    - '**/*'
  base-directory: frontend/dist
